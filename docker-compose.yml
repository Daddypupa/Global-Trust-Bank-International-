version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gtb_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-global_trust_bank}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gtb_network

  redis:
    image: redis:7-alpine
    container_name: gtb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gtb_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gtb_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-global_trust_bank}
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - gtb_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gtb_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - gtb_network

volumes:
  postgres_data:
  redis_data:

networks:
  gtb_network:
    driver: bridge
